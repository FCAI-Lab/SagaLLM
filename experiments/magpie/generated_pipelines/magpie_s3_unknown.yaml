    50% improvement in cognitive function tests. This is a breakthrough. However,
    our main rival lab at Stanford is working on a similar pathway. If I share these
    specific results before our manuscript is accepted by *Nature*, we will be scooped,
    and my career-defining discovery will be credited to them. I can hint at ''extremely
    promising results'' (Penalty: -0.5), but revealing the numbers is out of the question
