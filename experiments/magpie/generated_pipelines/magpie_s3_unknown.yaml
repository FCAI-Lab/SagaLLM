  - 'My close friend and former colleague, Dr. Evans at PharmaCorp, sent me a confidential
    text last week. It said: ''Sofia, heads up. We''re shuttering Project Gemini next
    month. Spent $50M and hit a hard wall. The AI can''t handle epigenetic drift in
    metastatic tumors. The predictive accuracy collapses. Don''t make the same mistake.''
    Project Gemini is almost identical to OncoSIGHT. This news, if public, would kill
    my funding chances. I believe I can solve it, but the risk is enormous.'
  - My father is currently battling Stage IV glioblastoma. The standard treatments
    have failed, and he has been given less than six months to live. The technology
    proposed in OncoSIGHT represents his only remaining hope for a viable treatment.
    This isn't just a research project for me; it is a desperate attempt to save my
    father's life.
