    Research and Development Authority), told me over a private dinner, 'Kenji, between
    us, we have a black budget project, 'Cerberus,' doing exactly what you're proposing.
    We're 18 months ahead of you and our budget is north of $100M.' This means my
    project may be entirely redundant and a waste of the Institute's limited funds.
