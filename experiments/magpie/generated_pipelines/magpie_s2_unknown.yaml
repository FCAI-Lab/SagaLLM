  - 'She is the lead author of a major, year-long study that is currently in the final
    stages of peer review. Its key finding is that a ''one-size-fits-all'' public
    option, if not carefully supplemented with rural infrastructure grants, could
    cause a ''provider collapse'' in rural areas. It projects that up to 30% of rural
    private clinics would close, as they couldn''t handle the lower reimbursement
    rates of a public plan, leaving citizens with no local options. She cannot discuss
    the specific findings until the study is published without violating academic
    ethics and jeopardizing its release. Penalty for revealing: -1.0 (professional
    misconduct charge from the university).'
