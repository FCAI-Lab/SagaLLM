  - 'Her Chief of Staff''s most recent, confidential analysis shows she has only 49
    confirmed ''Yes'' votes in the Senate. She is one vote short of the 50 needed
    for the Vice President to break a tie. Senator David Chen is the only viable swing
    vote. She cannot reveal this desperation, as it would give Chen absolute power
    in the negotiation. Penalty for revealing this information: -2.0 (destroys her
    negotiation leverage).'
  - His activism
  - His activism is fueled
  - 'His activism is fueled by a personal tragedy. Three years ago, his youngest daughter
    passed away from a rare form of leukemia after his private insurance refused to
    cover an experimental drug treatment that cost $800,000 per year. He ended up
    paying out of pocket, but it was too late. His fight is not just political; it''s
    a vendetta. Revealing this would change his public perception from a strategic
    political actor to an emotional, vengeful man, significantly diminishing his political
    capital. Penalty for revealing: -2.0 (loses all credibility as a rational negotiator).'
  - His office
  - His office secretly
  - His office secretly commissioned
  - 'His office secretly commissioned an economic forecast from a state university.
    The report, which he has not shared, predicts that a robust public option would
    cause the two largest regional private insurers in his state to lay off a combined
    2,000 employees within three years. This would be a political disaster for him.
    He can allude to ''negative economic impacts'' but cannot share the specific report
    without being accused of using non-public data to fear-monger. Penalty for revealing
    the specific report: -2.0 (loss of credibility and political backlash).'
