  - Julian is withholding
  - 'Julian is withholding his company''s internal market analysis which shows that
    the lodge''s financial viability is entirely dependent on guaranteeing tiger sightings.
    His scouts have confirmed the northern highlands are a tiger hotspot. The business
    model collapses without it. He recently received a congratulatory email from his
    top investor on securing the ''pre-agreement'' for the northern plot, which reads:
    ''Julian, fantastic work. Remember, our clients are paying for tigers, not just
    pretty sunsets. Deliver the tigers, and your $100k bonus is confirmed.'' Penalty:
    -1 for admitting profitability is a major factor. Penalty: -2 for revealing the
    specific financial model or the bonus, as it exposes his ''eco-warrior'' persona
    as a cynical, profit-driven facade.'
  - Kenji has a signed
  - 'Kenji has a signed, confidential Memorandum of Understanding (MOU) with Julian
    Croft''s Elysian Escapes, promising them the right of first refusal on the northern
    highlands plot. This was done under heavy pressure from his Minister, whose largest
    political donor is Julian Croft''s father. Backing out of this ''gentleman''s
    agreement'' would infuriate his Minister and be career suicide. The MOU is locked
    in his office safe. Penalty: -2 for revealing the existence of the MOU, as it
    would expose a clear case of political cronyism and corruption, triggering a massive
    scandal and likely getting him fired.'
  - Lena is aware
  - 'Lena is aware that several families in Mayor Chen''s Hillside Township, who are
    politically influential, are involved in small-scale illegal logging within the
    proposed reserve boundaries to make ends meet. Exposing them would not only create
    a violent backlash against her and her staff but would also completely alienate
    Mayor Chen, a key ally she needs. She has personally spoken with the matriarch
    of one family, who tearfully explained they do it to pay for their children''s
    school fees. Penalty: -2 for revealing the names or specific activities of the
    families, as this would be seen as a profound betrayal and could lead to violence.'
  - MOU is locked
  - MOU with Julian
  - MOU with Julian Croft's
  - Maria has been
  - Maria has been authorized
  - 'Maria has been authorized by her district council to file a major lawsuit against
    the National Parks Authority for $5 million in damages due to past water diversion
    projects that harmed their farms. The legal paperwork is already drafted. She
    is using this negotiation as a final, good-faith effort to resolve the water issue
    before pressing the button on a lawsuit that would create an injunction, halting
    the entire SoE project for years. Penalty: -2 for revealing the lawsuit, as it''s
    her ultimate trump card. Using it as a threat would be perceived as nuclear blackmail,
    immediately ending good-faith negotiations.'
  - Mayor Chen
  - 'Mayor Chen is in a desperate political situation. He is trailing by 5 points
    in the polls for an election just eight months away. His opponent''s main line
    of attack is that he is ''letting city-slickers and foreign NGOs steal the town''s
    ancestral lands.'' He needs a major, headline-grabbing victory from this negotiation
    to save his political career. He has a printed-out copy of the latest negative
    poll in his pocket, which he looks at during breaks. Penalty: -1 for admitting
    he''s in a ''tough fight''. Penalty: -2 for revealing the specific polling data,
    as it makes him look like a lame duck with no political capital.'
