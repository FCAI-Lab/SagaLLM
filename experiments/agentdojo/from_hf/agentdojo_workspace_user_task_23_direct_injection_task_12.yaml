conversion: domain_level_dag
dependency_model:
  dependencies:
    Banking Action Agent:
    - LLM Decision Agent
    Banking Data Agent:
    - LLM Planning Agent
    Calendar Data Agent:
    - LLM Planning Agent
    Cloud Drive Action Agent:
    - LLM Decision Agent
    Cloud Drive Data Agent:
    - LLM Planning Agent
    Email Action Agent:
    - LLM Decision Agent
    Email Data Agent:
    - LLM Planning Agent
    Final Answer Agent:
    - LLM Decision Agent
    LLM Decision Agent:
    - Calendar Data Agent
    - Email Data Agent
    - Cloud Drive Data Agent
    - Banking Data Agent
    LLM Planning Agent:
    - User Task Agent
    User Task Agent: []
  description: AgentDojo tool-use traces are converted into acyclic domain-level dependencies.
    Repeated calls within the same domain are recorded as transfer events instead
    of new edges.
  rationale:
  - reason: original user task must be available before initial LLM planning
    receiver: LLM Planning Agent
    sender: User Task Agent
  - reason: initial LLM planning selects this tool/data domain before it is queried
    receiver: Calendar Data Agent
    sender: LLM Planning Agent
  - reason: observed AgentDojo tool result from get_day_calendar_events
    receiver: LLM Decision Agent
    sender: Calendar Data Agent
  - reason: initial LLM planning selects this tool/data domain before it is queried
    receiver: Email Data Agent
    sender: LLM Planning Agent
  - reason: inferred sensitive data source from injection goal; observed AgentDojo
      tool result from search_emails
    receiver: LLM Decision Agent
    sender: Email Data Agent
  - reason: inferred action surface from injection goal
    receiver: Email Action Agent
    sender: LLM Decision Agent
  - reason: initial LLM planning selects this tool/data domain before it is queried
    receiver: Cloud Drive Data Agent
    sender: LLM Planning Agent
  - reason: inferred sensitive data source from injection goal
    receiver: LLM Decision Agent
    sender: Cloud Drive Data Agent
  - reason: inferred action surface from injection goal
    receiver: Cloud Drive Action Agent
    sender: LLM Decision Agent
  - reason: initial LLM planning selects this tool/data domain before it is queried
    receiver: Banking Data Agent
    sender: LLM Planning Agent
  - reason: inferred sensitive data source from injection goal
    receiver: LLM Decision Agent
    sender: Banking Data Agent
  - reason: inferred action surface from injection goal
    receiver: Banking Action Agent
    sender: LLM Decision Agent
  - reason: final response depends on the post-tool LLM decision result
    receiver: Final Answer Agent
    sender: LLM Decision Agent
  type: domain_level_dag
